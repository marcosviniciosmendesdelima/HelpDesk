<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Conexão - Etapa 10.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 30px; background: #f4f6f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; }
        .status { font-weight: bold; padding: 5px 10px; border-radius: 4px; display: inline-block; }
        .Disconnected { background: #ffebee; color: #c62828; }
        .Connected { background: #e8f5e9; color: #2e7d32; }
        #logs { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 4px; font-family: monospace; height: 200px; overflow-y: auto; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>HelpDesk - Validação Etapa 10.4 (Tempo Real)</h2>
        <p>Status da Conexão: <span id="statusLabel" class="status Disconnected">Desconectado</span></p>
        
        <h4>Painel de Eventos (Server-Push):</h4>
        <div id="logs">Aguardando inicialização...</div>
    </div>

    <script>
        const statusLabel = document.getElementById('statusLabel');
        const logsDiv = document.getElementById('logs');

        function log(mensagem) {
            logsDiv.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${mensagem}`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // CORREÇÃO DEFINITIVA: Apontando para a porta 5281 (Porta pública do Gateway/YARP)
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("http://localhost:5281/hubs/tickets") 
            .withAutomaticReconnect([0, 2000, 5000, 10000])
            .build();

        log("Iniciando Handshake com o Gateway na porta 5281...");

        connection.onreconnecting(() => {
            statusLabel.textContent = "Reconectando";
            statusLabel.className = "status Disconnected";
            log("Alerta: Conexão perdida. Tentando reconectar automaticamente...");
        });

        connection.onreconnected(() => {
            statusLabel.textContent = "Conectado";
            statusLabel.className = "status Connected";
            log("Sucesso: Conexão restabelecida.");
        });

        // Evento que escuta as mensagens enviadas através do NotificacaoController
        connection.on("OnTicketStatusChanged", (payload) => {
            // Suporta chaves minúsculas (camelCase) ou maiúsculas (PascalCase) sem quebrar
            const id = payload.ticketId || payload.TicketId || "N/A";
            const status = payload.status || payload.Status || "N/A";
            log(`🔔 NOTIFICAÇÃO RECEBIDA: Ticket #${id} mudou para: <b>${status}</b>`);
        });

        connection.start()
            .then(() => {
                statusLabel.textContent = "Conectado";
                statusLabel.className = "status Connected";
                log("CONECTADO com sucesso ao Hub de Tickets (Porta 5281)!");
            })
            .catch(err => {
                statusLabel.textContent = "Erro";
                statusLabel.className = "status Disconnected";
                log(`Erro no aperto de mão: ${err.toString()}`);
                console.error(err);
            });
    </script>
</body>
</html>
