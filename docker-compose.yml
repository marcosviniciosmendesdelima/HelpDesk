version: '3.8'

services:
  api-helpdesk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk-api-helpdesk-1
    ports:
      - "5000:80"
    environment:
      DATABASE_URL: postgresql://postgres:SenhaForte123@db-helpdesk:5432/postgres
    depends_on:
      - db-helpdesk

  db-helpdesk:
    image: postgres:15-alpine
    container_name: helpdesk-db-helpdesk-1
    environment:
      POSTGRES_PASSWORD: SenhaForte123
    ports:
      - "5432:5432"
    volumes:
      - helpdesk-data:/var/lib/postgresql/data

  helpdesk-cache:
    image: redis:7-alpine
    container_name: helpdesk-cache
    ports:
      - "6379:6379"

  helpdesk-rabbitmq:
    image: rabbitmq:3-management
    container_name: helpdesk-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  helpdesk-gateway:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: helpdesk-gateway
    ports:
      - "5281:8080"
    volumes:
      - ./HelpDesk.Gateway:/app
    working_dir: /app
    command: dotnet watch run --urls http://0.0.0.0:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - helpdesk-cache
      - helpdesk-rabbitmq

volumes:
  helpdesk-data: