services:
  api-helpdesk:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8000"  # O Windows acessa na 5000, o Docker entrega na 8000
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db-helpdesk:5432/helpdesk
    depends_on:
      - db-helpdesk

  db-helpdesk:
    image: postgres:15-alpine
    container_name: db-helpdesk-1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=helpdesk
    ports:
      - "5432:5432"
    volumes:
      - helpdesk-data:/var/lib/postgresql/data 

volumes:
  helpdesk-data: